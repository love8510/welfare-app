<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재가복지 스마트 케어 — 소양강댐노인복지관</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* 디자인 시스템 및 변수 */
:root {
  --primary: #185FA5;
  --primary-light: #E6F1FB;
  --bg-main: #F8F9FA;
  --bg-card: #FFFFFF;
  --text-main: #2D3436;
  --text-sub: #636E72;
  --border: #EDF2F7;
  --danger: #E24B4A;
  --success: #27AE60;
  --warning: #F39C12;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; background:var(--bg-main); color:var(--text-main); line-height: 1.5;}

.app{display:flex;flex-direction:column;min-height:100vh;max-width:500px;margin:0 auto;background:var(--bg-main);box-shadow: 0 0 40px rgba(0,0,0,0.05)}

/* 상단 바 디자인 개선 */
.topbar{background:var(--bg-card); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; border-bottom:1px solid var(--border)}
.topbar-title{font-size:18px; font-weight:700; color:var(--primary); letter-spacing:-0.5px}
.topbar-sub{font-size:12px; color:var(--text-sub); margin-top:1px}

/* 내비게이션 바 - 더 모던한 스타일 */
.nav{display:flex; background:var(--bg-card); padding:8px 12px; gap:8px; border-bottom:1px solid var(--border); position:sticky; top:63px; z-index:10}
.nav-btn{flex:1; padding:10px 0; font-size:12px; color:var(--text-sub); background:none; border:none; cursor:pointer; border-radius:10px; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:4px}
.nav-btn i{font-size:20px}
.nav-btn.active{background:var(--primary-light); color:var(--primary); font-weight:600}

.content{flex:1; padding:16px}
.section{display:none; animation: fadeIn 0.3s ease-out}
.section.active{display:block}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* 카드 디자인 강화 */
.card{background:var(--bg-card); border-radius:16px; padding:18px; margin-bottom:14px; border:1px solid var(--border); shadow: var(--shadow)}
.card-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:15px}
.card-title{font-size:15px; font-weight:700; color:var(--text-main)}

/* 뱃지 시스템 */
.badge{display:inline-flex; align-items:center; padding:4px 10px; border-radius:8px; font-size:11px; font-weight:600}
.badge-green{background:#E8F5E9; color:#2E7D32}
.badge-amber{background:#FFF8E1; color:#F57F17}
.badge-red{background:#FFEBEE; color:#C62828}
.badge-blue{background:var(--primary-light); color:var(--primary)}
.badge-gray{background:#F5F5F5; color:#757575}

/* 통계 그리드 개선 */
.stat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px}
.stat-card{background:var(--bg-card); border-radius:16px; padding:16px; border:1px solid var(--border); display:flex; flex-direction:column; align-items:center}
.stat-num{font-size:26px; font-weight:800; margin-bottom:4px}
.stat-label{font-size:12px; color:var(--text-sub); font-weight:500}

/* 버튼 스타일링 */
.btn-add{width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--primary); color:#fff; border:none; border-radius:12px; padding:14px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:16px; box-shadow: 0 4px 12px rgba(24, 95, 165, 0.2)}
.btn-add:active{transform: scale(0.98)}

/* 검색 바 개선 */
.search-bar{display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:16px; transition: border-color 0.2s}
.search-bar:focus-within{border-color: var(--primary)}
.search-bar input{border:none; background:none; flex:1; font-size:14px; outline:none}

/* 일정 리스트 아이템 디자인 */
.sched-item{background:#fff; border-radius:14px; padding:16px; margin-bottom:10px; border:1px solid var(--border); display:flex; align-items:center; gap:14px; transition: transform 0.2s}
.sched-item:active{transform: scale(0.99)}
.sched-left{flex:1}
.sched-time{font-size:12px; color:var(--primary); font-weight:700; margin-bottom:4px}
.sched-name{font-size:15px; font-weight:700; margin-bottom:4px}
.sched-type{font-size:12px; color:var(--text-sub); display:flex; align-items:center; gap:4px}

/* 모달 디자인 대폭 강화 */
.modal-bg{background:rgba(0,0,0,0.6); backdrop-filter: blur(4px)}
.modal{border-radius:24px; padding:24px; border:none}
.modal-title{font-size:20px; font-weight:800; color:var(--primary); margin-bottom:20px}
.form-group input, .form-group select, .form-group textarea {
  background: #F8F9FA; border: 1px solid #E9ECEF; padding: 12px; border-radius: 12px; transition: all 0.2s;
}
.form-group input:focus { border-color: var(--primary); background: #fff; }

/* 토스트 메시지 */
.toast{background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); border-radius: 12px; padding: 12px 24px}

</style>
</head>
<body>
