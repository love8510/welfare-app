<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재가복지 관리 — 소양강댐노인복지관</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:600px;margin:0 auto;background:#f5f5f0}
.topbar{background:#fff;border-bottom:0.5px solid #e0ddd6;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar-title{font-size:16px;font-weight:500}
.topbar-sub{font-size:12px;color:#888;margin-top:2px}
.nav{display:flex;background:#fff;border-bottom:0.5px solid #e0ddd6;position:sticky;top:57px;z-index:5}
.nav-btn{flex:1;padding:10px 4px;font-size:11px;color:#888;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn.active{color:#185FA5;border-bottom-color:#185FA5}
.nav-btn i{font-size:18px}
.content{flex:1;padding:12px}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border:0.5px solid #e0ddd6;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-title{font-size:14px;font-weight:500}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-purple{background:#EEEDFE;color:#534AB7}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0}
.av-blue{background:#E6F1FB;color:#185FA5}
.av-teal{background:#E1F5EE;color:#0F6E56}
.av-purple{background:#EEEDFE;color:#534AB7}
.av-coral{background:#FAECE7;color:#993C1D}
.person-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #e0ddd6;cursor:pointer}
.person-row:last-child{border-bottom:none}
.person-info{flex:1;min-width:0}
.person-name{font-size:14px;font-weight:500}
.person-sub{font-size:12px;color:#888;margin-top:2px}
.btn-add{display:flex;align-items:center;gap:6px;background:#185FA5;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:12px}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:0.5px solid #e0ddd6;border-radius:8px;padding:8px 12px;margin-bottom:12px}
.search-bar input{border:none;background:none;flex:1;font-size:13px;outline:none}
.sched-item{background:#fff;border-left:3px solid #185FA5;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;border-top:0.5px solid #e0ddd6;border-right:0.5px solid #e0ddd6;border-bottom:0.5px solid #e0ddd6;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sched-item.urgent{border-left-color:#E24B4A}
.sched-item.done{border-left-color:#3B6D11;opacity:0.7}
.sched-left{flex:1}
.sched-time{font-size:11px;color:#888;margin-bottom:3px}
.sched-name{font-size:14px;font-weight:500}
.sched-type{font-size:12px;color:#888;margin-top:2px}
.schedule-day{font-size:12px;font-weight:500;color:#888;margin:14px 0 6px;padding-bottom:4px;border-bottom:0.5px solid #e0ddd6}
.health-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #e0ddd6}
.health-row:last-child{border-bottom:none}
.health-label{font-size:13px;color:#888}
.health-val{font-size:13px;font-weight:500}
.emg-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #e0ddd6}
.emg-row:last-child{border-bottom:none}
.emg-info{flex:1}
.emg-name{font-size:14px;font-weight:500}
.emg-rel{font-size:12px;color:#888}
.call-btn{background:#EAF3DE;border:none;border-radius:8px;padding:7px 10px;color:#3B6D11;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;text-decoration:none}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat-card{background:#ebebeb;border-radius:8px;padding:12px}
.stat-num{font-size:24px;font-weight:500}
.stat-label{font-size:12px;color:#888;margin-top:2px}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:20;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:440px;margin:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:14px}
.form-group{margin-bottom:11px}
.form-label{font-size:12px;color:#888;margin-bottom:4px;display:block}
.form-group input,.form-group select,.form-group textarea{width:100%;font-size:13px;border:0.5px solid #ccc;border-radius:8px;padding:8px 10px;outline:none;background:#fff;font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.section-divider{font-size:11px;font-weight:500;color:#888;border-bottom:0.5px solid #e0ddd6;padding-bottom:6px;margin:14px 0 10px;letter-spacing:0.5px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.cb-label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;background:#f5f5f0;border:0.5px solid #e0ddd6;border-radius:8px;padding:5px 10px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.btn-cancel{background:none;border:0.5px solid #ccc;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#888}
.btn-save{background:#185FA5;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer}
.btn-danger{background:#FCEBEB;color:#A32D2D;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer}
.detail-modal{max-width:460px}
.tab-row{display:flex;gap:4px;margin-bottom:14px;border-bottom:0.5px solid #e0ddd6}
.tab{padding:8px 12px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#185FA5;border-bottom-color:#185FA5}
.detail-section{display:none}
.detail-section.active{display:block}
.field-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:13px}
.field-label{color:#888;min-width:80px;flex-shrink:0;padding-top:1px}
.field-val{flex:1}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:99;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty-msg{color:#888;font-size:13px;padding:24px 0;text-align:center}
.sched-done-btn{font-size:11px;padding:4px 8px;border-radius:6px;border:0.5px solid #ccc;background:#f5f5f0;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sched-done-btn.done{background:#EAF3DE;color:#3B6D11;border-color:#c0dd97}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="topbar-title">재가복지 관리</div>
      <div class="topbar-sub">소양강댐노인복지관</div>
    </div>
    <i class="ti ti-bell" style="font-size:20px;color:#888"></i>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('home')"><i class="ti ti-home"></i>홈</button>
    <button class="nav-btn" onclick="showTab('seniors')"><i class="ti ti-users"></i>어르신</button>
    <button class="nav-btn" onclick="showTab('schedule')"><i class="ti ti-calendar"></i>일정</button>
    <button class="nav-btn" onclick="showTab('health')"><i class="ti ti-heart-rate-monitor"></i>건강</button>
    <button class="nav-btn" onclick="showTab('emergency')"><i class="ti ti-phone-call"></i>긴급</button>
  </div>

  <div class="content">

    <!-- 홈 -->
    <div class="section active" id="sec-home">
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="cnt-total">0</div><div class="stat-label">전체 어르신</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#185FA5" id="cnt-today">0</div><div class="stat-label">오늘 방문 예정</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#E24B4A" id="cnt-urgent">0</div><div class="stat-label">긴급 확인 필요</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#3B6D11" id="cnt-done">0</div><div class="stat-label">방문 완료</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title" id="home-sched-title">오늘 방문 일정</span></div>
        <div id="home-sched-list"><div class="empty-msg">등록된 일정이 없습니다.</div></div>
      </div>
    </div>

    <!-- 어르신 -->
    <div class="section" id="sec-seniors">
      <div class="search-bar">
        <i class="ti ti-search" style="color:#888;font-size:16px"></i>
        <input type="text" id="search-input" placeholder="이름 또는 주소 검색" oninput="filterSeniors()">
      </div>
      <button class="btn-add" onclick="openAddModal('senior')"><i class="ti ti-plus"></i> 어르신 등록</button>
      <div class="card" style="padding:0 16px"><div id="seniors-list"></div></div>
    </div>

    <!-- 일정 -->
    <div class="section" id="sec-schedule">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button class="btn-add" style="margin-bottom:0" onclick="openAddModal('schedule')"><i class="ti ti-plus"></i> 일정 등록</button>
        <input type="date" id="sched-filter-date" style="font-size:13px;border:0.5px solid #ccc;border-radius:8px;padding:7px 10px;background:#fff;outline:none;flex:1" onchange="renderSchedule()">
      </div>
      <div id="schedule-list"></div>
    </div>

    <!-- 건강 -->
    <div class="section" id="sec-health">
      <div id="health-list"></div>
    </div>

    <!-- 긴급 -->
    <div class="section" id="sec-emergency">
      <div id="emg-list"></div>
    </div>

  </div>
</div>

<!-- 어르신 등록 모달 -->
<div class="modal-bg" id="modal-senior">
  <div class="modal">
    <div class="modal-title">어르신 등록</div>
    <div class="section-divider">기본 정보</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">성함</label><input type="text" id="f-name" placeholder="홍길동"></div>
      <div class="form-group"><label class="form-label">나이</label><input type="number" id="f-age" placeholder="75"></div>
    </div>
    <div class="form-group"><label class="form-label">주소</label><input type="text" id="f-addr" placeholder="춘천시 효자동 123"></div>
    <div class="form-group"><label class="form-label">담당 사회복지사</label><input type="text" id="f-worker" placeholder="이민정"></div>

    <div class="section-divider">수급 유형 (해당 항목 모두 선택)</div>
    <div class="checkbox-group" id="benefit-checks">
      <label class="cb-label"><input type="checkbox" value="수급대상"> 수급대상</label>
      <label class="cb-label"><input type="checkbox" value="기초연금"> 기초연금</label>
      <label class="cb-label"><input type="checkbox" value="차상위"> 차상위</label>
      <label class="cb-label"><input type="checkbox" value="장애1급"> 장애 1급</label>
      <label class="cb-label"><input type="checkbox" value="장애2급"> 장애 2급</label>
      <label class="cb-label"><input type="checkbox" value="장애3급"> 장애 3급</label>
      <label class="cb-label"><input type="checkbox" value="장애4급"> 장애 4급</label>
      <label class="cb-label"><input type="checkbox" value="장애5급"> 장애 5급</label>
      <label class="cb-label"><input type="checkbox" value="장애6급"> 장애 6급</label>
    </div>

    <div class="section-divider">가족 형태</div>
    <div class="form-group">
      <select id="f-family">
        <option value="">선택</option>
        <option value="독거">독거</option>
        <option value="노인부부">노인부부</option>
        <option value="자녀동거">자녀동거</option>
        <option value="손자녀동거">손자녀동거</option>
        <option value="기타가족동거">기타 가족동거</option>
        <option value="시설입소">시설입소</option>
      </select>
    </div>

    <div class="section-divider">건강 정보</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">혈압 (예: 128/76)</label><input type="text" id="f-bp" placeholder="128/76"></div>
      <div class="form-group"><label class="form-label">혈당 (mg/dL)</label><input type="text" id="f-bs" placeholder="105"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">체온 (°C)</label><input type="text" id="f-temp" placeholder="36.5"></div>
      <div class="form-group"><label class="form-label">건강 상태</label>
        <select id="f-status">
          <option value="양호">양호</option>
          <option value="관찰 중">관찰 중</option>
          <option value="긴급">긴급</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">특이사항</label><input type="text" id="f-note" placeholder="특이사항 입력"></div>

    <div class="section-divider">긴급 연락처</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">성함</label><input type="text" id="f-cname" placeholder="김민준"></div>
      <div class="form-group"><label class="form-label">관계</label><input type="text" id="f-crel" placeholder="자녀 (아들)"></div>
    </div>
    <div class="form-group"><label class="form-label">전화번호</label><input type="tel" id="f-cphone" placeholder="010-0000-0000"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('senior')">취소</button>
      <button class="btn-save" onclick="saveSenior()">등록</button>
    </div>
  </div>
</div>

<!-- 일정 등록 모달 -->
<div class="modal-bg" id="modal-schedule">
  <div class="modal">
    <div class="modal-title">방문 일정 등록</div>
    <div class="form-group">
      <label class="form-label">어르신 선택</label>
      <select id="s-senior">
        <option value="">어르신을 선택하세요</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">방문 날짜</label><input type="date" id="s-date"></div>
      <div class="form-group"><label class="form-label">방문 시간</label><input type="time" id="s-time"></div>
    </div>
    <div class="form-group">
      <label class="form-label">서비스 종류</label>
      <select id="s-type">
        <option value="방문요양">방문요양</option>
        <option value="목욕 보조">목욕 보조</option>
        <option value="가사 지원">가사 지원</option>
        <option value="식사 보조">식사 보조</option>
        <option value="통원 동행">통원 동행</option>
        <option value="건강 확인">건강 확인</option>
        <option value="정서 지원">정서 지원</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">담당 직원</label><input type="text" id="s-worker" placeholder="담당자 이름"></div>
    <div class="form-group"><label class="form-label">메모</label><textarea id="s-memo" placeholder="특이사항이나 준비사항을 입력하세요"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('schedule')">취소</button>
      <button class="btn-save" onclick="saveSchedule()">등록</button>
    </div>
  </div>
</div>

<!-- 일정 상세 모달 -->
<div class="modal-bg" id="modal-sched-detail">
  <div class="modal">
    <div class="modal-title">방문 일정 상세</div>
    <div class="field-row"><span class="field-label">어르신</span><span class="field-val" id="sd-senior"></span></div>
    <div class="field-row"><span class="field-label">날짜</span><span class="field-val" id="sd-date"></span></div>
    <div class="field-row"><span class="field-label">시간</span><span class="field-val" id="sd-time"></span></div>
    <div class="field-row"><span class="field-label">서비스</span><span class="field-val" id="sd-type"></span></div>
    <div class="field-row"><span class="field-label">담당자</span><span class="field-val" id="sd-worker"></span></div>
    <div class="field-row"><span class="field-label">메모</span><span class="field-val" id="sd-memo"></span></div>
    <div class="field-row"><span class="field-label">완료 여부</span><span class="field-val" id="sd-done"></span></div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="deleteSchedule()">삭제</button>
      <button class="btn-save" onclick="toggleSchedDone()">완료 처리</button>
      <button class="btn-cancel" onclick="closeModal('sched-detail')">닫기</button>
    </div>
  </div>
</div>

<!-- 어르신 상세 모달 -->
<div class="modal-bg" id="modal-detail">
  <div class="modal detail-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar av-blue" id="d-avatar"></div>
        <div>
          <div style="font-size:15px;font-weight:500" id="d-name"></div>
          <div style="font-size:12px;color:#888" id="d-sub"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="deleteCurrentSenior()" style="background:none;border:none;cursor:pointer;color:#E24B4A"><i class="ti ti-trash" style="font-size:18px"></i></button>
        <button onclick="closeModal('detail')" style="background:none;border:none;cursor:pointer;color:#888"><i class="ti ti-x" style="font-size:20px"></i></button>
      </div>
    </div>
    <div class="tab-row">
      <button class="tab active" onclick="showDetailTab('info')">기본 정보</button>
      <button class="tab" onclick="showDetailTab('health')">건강 기록</button>
      <button class="tab" onclick="showDetailTab('contact')">연락처</button>
    </div>
    <div class="detail-section active" id="dt-info">
      <div class="field-row"><span class="field-label">주소</span><span class="field-val" id="d-addr"></span></div>
      <div class="field-row"><span class="field-label">수급 유형</span><span class="field-val" id="d-benefits"></span></div>
      <div class="field-row"><span class="field-label">가족 형태</span><span class="field-val" id="d-family"></span></div>
      <div class="field-row"><span class="field-label">담당자</span><span class="field-val" id="d-worker"></span></div>
      <div class="field-row"><span class="field-label">상태</span><span class="field-val" id="d-status"></span></div>
    </div>
    <div class="detail-section" id="dt-health">
      <div class="health-row"><span class="health-label">혈압</span><span class="health-val" id="d-bp"></span></div>
      <div class="health-row"><span class="health-label">혈당</span><span class="health-val" id="d-bs"></span></div>
      <div class="health-row"><span class="health-label">체온</span><span class="health-val" id="d-temp"></span></div>
      <div class="health-row"><span class="health-label">특이사항</span><span class="health-val" id="d-note"></span></div>
    </div>
    <div class="detail-section" id="dt-contact">
      <div class="emg-row" style="padding:8px 0">
        <div class="avatar av-blue" style="width:36px;height:36px;font-size:13px"><i class="ti ti-user"></i></div>
        <div class="emg-info"><div class="emg-name" id="d-cname"></div><div class="emg-rel" id="d-crel"></div></div>
        <a class="call-btn" id="d-cphone" href="#"><i class="ti ti-phone"></i></a>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const avColors=['av-blue','av-teal','av-purple','av-coral'];
const statusCls={'양호':'badge-green','관찰 중':'badge-amber','긴급':'badge-red'};
const serviceIcon={'방문요양':'ti-heart','목욕 보조':'ti-droplet','가사 지원':'ti-home','식사 보조':'ti-salad','통원 동행':'ti-stethoscope','건강 확인':'ti-heart-rate-monitor','정서 지원':'ti-mood-smile','기타':'ti-file'};
let currentDetailId=null, currentSchedId=null;

const LS_S='welfare_seniors', LS_SC='welfare_schedules';
const loadSeniors=()=>{try{return JSON.parse(localStorage.getItem(LS_S)||'[]')}catch{return[]}};
const saveSeniors=l=>localStorage.setItem(LS_S,JSON.stringify(l));
const loadSchedules=()=>{try{return JSON.parse(localStorage.getItem(LS_SC)||'[]')}catch{return[]}};
const saveSchedules=l=>localStorage.setItem(LS_SC,JSON.stringify(l));

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function benefitBadge(b){
  const m={'수급대상':'badge-red','기초연금':'badge-blue','차상위':'badge-amber'};
  const cls=b.startsWith('장애')?'badge-purple':(m[b]||'badge-gray');
  return `<span class="badge ${cls}" style="margin-right:3px;margin-bottom:3px">${b}</span>`;
}

function formatDate(str){
  if(!str)return'-';
  const [y,m,d]=str.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
}

/* ───── 홈 ───── */
function renderHome(){
  const seniors=loadSeniors(), scheds=loadSchedules(), today=todayStr();
  document.getElementById('cnt-total').textContent=seniors.length;
  document.getElementById('cnt-urgent').textContent=seniors.filter(s=>s.status==='긴급').length;
  const todayScheds=scheds.filter(s=>s.date===today);
  document.getElementById('cnt-today').textContent=todayScheds.length;
  document.getElementById('cnt-done').textContent=todayScheds.filter(s=>s.done).length;

  const el=document.getElementById('home-sched-list');
  document.getElementById('home-sched-title').textContent=`오늘 방문 일정 (${formatDate(today)})`;
  if(!todayScheds.length){el.innerHTML='<div class="empty-msg">오늘 등록된 방문 일정이 없습니다.</div>';return;}
  const sorted=todayScheds.slice().sort((a,b)=>a.time.localeCompare(b.time));
  el.innerHTML=sorted.map(s=>{
    const senior=seniors.find(x=>x.id==s.seniorId);
    return `<div class="sched-item${s.done?' done':s.urgent?' urgent':''}" onclick="openSchedDetail(${s.id})">
      <div class="sched-left">
        <div class="sched-time">${s.time||'시간 미정'}</div>
        <div class="sched-name">${senior?senior.name+' 어르신':'알 수 없음'}</div>
        <div class="sched-type"><i class="ti ${serviceIcon[s.type]||'ti-file'}" style="font-size:12px"></i> ${s.type} · ${s.worker||'담당자 미정'}</div>
      </div>
      <span class="badge ${s.done?'badge-green':'badge-gray'}">${s.done?'완료':'예정'}</span>
    </div>`;
  }).join('');
}

/* ───── 어르신 ───── */
function renderSeniors(list){
  const el=document.getElementById('seniors-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">등록된 어르신이 없습니다.</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="person-row" onclick="openDetail(${s.id})">
      <div class="avatar ${avColors[s.avIdx%4]}">${s.name.slice(0,2)}</div>
      <div class="person-info">
        <div class="person-name">${s.name} (${s.age}세) <span class="badge badge-gray" style="margin-left:4px">${s.family||'-'}</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px">${(s.benefits||[]).map(benefitBadge).join('')}</div>
        <div class="person-sub" style="margin-top:3px">${s.addr} · ${s.worker}</div>
      </div>
      <span class="badge ${statusCls[s.status]||'badge-gray'}" style="flex-shrink:0;margin-left:6px">${s.status}</span>
    </div>`).join('');
}

function filterSeniors(){
  const q=document.getElementById('search-input').value.toLowerCase();
  renderSeniors(loadSeniors().filter(s=>s.name.includes(q)||s.addr.toLowerCase().includes(q)));
}

/* ───── 일정 ───── */
function renderSchedule(){
  const scheds=loadSchedules(), seniors=loadSeniors();
  const filterDate=document.getElementById('sched-filter-date').value;
  let list=scheds.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  if(filterDate) list=list.filter(s=>s.date===filterDate);

  const el=document.getElementById('schedule-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">등록된 일정이 없습니다.</div>';return;}

  const grouped={};
  list.forEach(s=>{grouped[s.date]=grouped[s.date]||[];grouped[s.date].push(s);});
  el.innerHTML=Object.keys(grouped).sort().map(date=>`
    <div class="schedule-day">${formatDate(date)}</div>
    ${grouped[date].map(s=>{
      const senior=seniors.find(x=>x.id==s.seniorId);
      return `<div class="sched-item${s.done?' done':s.urgent?' urgent':''}" onclick="openSchedDetail(${s.id})">
        <div class="sched-left">
          <div class="sched-time">${s.time||'시간 미정'}</div>
          <div class="sched-name">${senior?senior.name+' 어르신':'알 수 없음'}</div>
          <div class="sched-type"><i class="ti ${serviceIcon[s.type]||'ti-file'}" style="font-size:12px"></i> ${s.type} · ${s.worker||'담당자 미정'}</div>
          ${s.memo?`<div class="sched-type" style="margin-top:3px;color:#aaa">${s.memo}</div>`:''}
        </div>
        <span class="badge ${s.done?'badge-green':'badge-gray'}">${s.done?'완료':'예정'}</span>
      </div>`;
    }).join('')}`).join('');
}

/* ───── 건강 ───── */
function renderHealth(){
  const list=loadSeniors();
  const el=document.getElementById('health-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">등록된 어르신이 없습니다.</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="avatar ${avColors[s.avIdx%4]}">${s.name.slice(0,2)}</div>
          <div><div class="card-title">${s.name} (${s.age}세)</div><div style="font-size:12px;color:#888">최근 기록</div></div>
        </div>
        <span class="badge ${statusCls[s.status]||'badge-gray'}">${s.status}</span>
      </div>
      <div class="health-row"><span class="health-label">혈압</span><span class="health-val">${s.bp||'-'} mmHg</span></div>
      <div class="health-row"><span class="health-label">혈당</span><span class="health-val">${s.bs||'-'} mg/dL</span></div>
      <div class="health-row"><span class="health-label">체온</span><span class="health-val">${s.temp||'-'}°C</span></div>
      <div class="health-row"><span class="health-label">특이사항</span><span class="health-val">${s.note||'-'}</span></div>
    </div>`).join('');
}

/* ───── 긴급 ───── */
function renderEmergency(){
  const list=loadSeniors();
  const el=document.getElementById('emg-list');
  if(!list.length){el.innerHTML='<div class="empty-msg">등록된 어르신이 없습니다.</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="card">
      <div class="card-header"><span class="card-title">${s.name} 어르신</span><span class="badge ${statusCls[s.status]||'badge-gray'}">${s.status}</span></div>
      <div class="emg-row">
        <div class="avatar av-blue" style="width:36px;height:36px;font-size:13px"><i class="ti ti-user"></i></div>
        <div class="emg-info"><div class="emg-name">${s.cName||'-'}</div><div class="emg-rel">${s.cRel||'-'}</div></div>
        <a class="call-btn" href="tel:${s.cPhone||''}"><i class="ti ti-phone"></i> ${s.cPhone||'-'}</a>
      </div>
      <div class="emg-row">
        <div class="avatar" style="width:36px;height:36px;font-size:13px;background:#FCEBEB;color:#A32D2D;border-radius:50%;display:flex;align-items:center;justify-content:center"><i class="ti ti-ambulance"></i></div>
        <div class="emg-info"><div class="emg-name">119 응급</div><div class="emg-rel">긴급구조</div></div>
        <a class="call-btn" style="background:#FCEBEB;color:#A32D2D" href="tel:119"><i class="ti ti-phone"></i> 119</a>
      </div>
    </div>`).join('');
}

/* ───── 탭 전환 ───── */
function showTab(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  const nm={home:0,seniors:1,schedule:2,health:3,emergency:4};
  document.querySelectorAll('.nav-btn')[nm[id]].classList.add('active');
  if(id==='seniors') renderSeniors(loadSeniors());
  if(id==='schedule') renderSchedule();
  if(id==='health') renderHealth();
  if(id==='emergency') renderEmergency();
  if(id==='home') renderHome();
}

/* ───── 모달 ───── */
function openAddModal(type){
  if(type==='schedule'){
    const sel=document.getElementById('s-senior');
    sel.innerHTML='<option value="">어르신을 선택하세요</option>';
    loadSeniors().forEach(s=>{
      sel.innerHTML+=`<option value="${s.id}">${s.name} (${s.age}세)</option>`;
    });
    document.getElementById('s-date').value=todayStr();
  }
  document.getElementById('modal-'+type).classList.add('open');
}
function closeModal(type){document.getElementById('modal-'+type).classList.remove('open');}

/* ───── 어르신 저장 ───── */
function saveSenior(){
  const name=document.getElementById('f-name').value.trim();
  const age=document.getElementById('f-age').value;
  if(!name||!age){alert('성함과 나이를 입력해주세요.');return;}
  const list=loadSeniors();
  const checked=Array.from(document.querySelectorAll('#benefit-checks input:checked')).map(c=>c.value);
  list.push({
    id:Date.now(),name,age:parseInt(age),
    addr:document.getElementById('f-addr').value.trim()||'주소 미입력',
    benefits:checked.length?checked:['해당없음'],
    family:document.getElementById('f-family').value||'미입력',
    worker:document.getElementById('f-worker').value.trim()||'미배정',
    status:document.getElementById('f-status').value||'양호',
    bp:document.getElementById('f-bp').value.trim()||'-',
    bs:document.getElementById('f-bs').value.trim()||'-',
    temp:document.getElementById('f-temp').value.trim()||'-',
    note:document.getElementById('f-note').value.trim()||'-',
    cName:document.getElementById('f-cname').value.trim()||'-',
    cRel:document.getElementById('f-crel').value.trim()||'-',
    cPhone:document.getElementById('f-cphone').value.trim()||'-',
    avIdx:list.length%4
  });
  saveSeniors(list);
  renderSeniors(list);
  renderHome();
  ['f-name','f-age','f-addr','f-worker','f-bp','f-bs','f-temp','f-note','f-cname','f-crel','f-cphone'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-family').value='';
  document.getElementById('f-status').value='양호';
  document.querySelectorAll('#benefit-checks input').forEach(c=>c.checked=false);
  closeModal('senior');
  toast('어르신이 등록되었습니다.');
}

/* ───── 일정 저장 ───── */
function saveSchedule(){
  const seniorId=document.getElementById('s-senior').value;
  const date=document.getElementById('s-date').value;
  if(!seniorId){alert('어르신을 선택해주세요.');return;}
  if(!date){alert('날짜를 선택해주세요.');return;}
  const list=loadSchedules();
  list.push({
    id:Date.now(),
    seniorId:parseInt(seniorId),
    date,
    time:document.getElementById('s-time').value||'',
    type:document.getElementById('s-type').value,
    worker:document.getElementById('s-worker').value.trim(),
    memo:document.getElementById('s-memo').value.trim(),
    done:false,urgent:false
  });
  saveSchedules(list);
  renderSchedule();
  renderHome();
  ['s-worker','s-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('s-senior').value='';
  document.getElementById('s-time').value='';
  document.getElementById('s-type').value='방문요양';
  closeModal('schedule');
  toast('일정이 등록되었습니다.');
}

/* ───── 일정 상세 ───── */
function openSchedDetail(id){
  const s=loadSchedules().find(x=>x.id===id);if(!s)return;
  currentSchedId=id;
  const senior=loadSeniors().find(x=>x.id==s.seniorId);
  document.getElementById('sd-senior').textContent=senior?senior.name+' 어르신':'알 수 없음';
  document.getElementById('sd-date').textContent=formatDate(s.date);
  document.getElementById('sd-time').textContent=s.time||'시간 미정';
  document.getElementById('sd-type').textContent=s.type;
  document.getElementById('sd-worker').textContent=s.worker||'담당자 미정';
  document.getElementById('sd-memo').textContent=s.memo||'-';
  document.getElementById('sd-done').innerHTML=s.done?'<span class="badge badge-green">완료</span>':'<span class="badge badge-gray">예정</span>';
  document.querySelector('#modal-sched-detail .btn-save').textContent=s.done?'예정으로 변경':'완료 처리';
  document.getElementById('modal-sched-detail').classList.add('open');
}

function toggleSchedDone(){
  const list=loadSchedules();
  const idx=list.findIndex(x=>x.id===currentSchedId);
  if(idx<0)return;
  list[idx].done=!list[idx].done;
  saveSchedules(list);
  closeModal('sched-detail');
  renderSchedule();
  renderHome();
  toast(list[idx].done?'방문 완료로 처리했습니다.':'예정으로 변경했습니다.');
}

function deleteSchedule(){
  if(!confirm('이 일정을 삭제하시겠습니까?'))return;
  saveSchedules(loadSchedules().filter(s=>s.id!==currentSchedId));
  closeModal('sched-detail');
  renderSchedule();
  renderHome();
  toast('일정이 삭제되었습니다.');
}

/* ───── 어르신 상세 ───── */
function openDetail(id){
  const s=loadSeniors().find(x=>x.id===id);if(!s)return;
  currentDetailId=id;
  document.getElementById('d-avatar').textContent=s.name.slice(0,2);
  document.getElementById('d-avatar').className='avatar '+avColors[s.avIdx%4];
  document.getElementById('d-name').textContent=s.name;
  document.getElementById('d-sub').textContent=s.age+'세 · '+(s.family||'-');
  document.getElementById('d-addr').textContent=s.addr;
  document.getElementById('d-benefits').innerHTML=(s.benefits||[]).map(benefitBadge).join('');
  document.getElementById('d-family').textContent=s.family||'-';
  document.getElementById('d-worker').textContent=s.worker;
  document.getElementById('d-status').innerHTML=`<span class="badge ${statusCls[s.status]||'badge-gray'}">${s.status}</span>`;
  document.getElementById('d-bp').textContent=(s.bp||'-')+' mmHg';
  document.getElementById('d-bs').textContent=(s.bs||'-')+' mg/dL';
  document.getElementById('d-temp').textContent=(s.temp||'-')+'°C';
  document.getElementById('d-note').textContent=s.note||'-';
  document.getElementById('d-cname').textContent=s.cName||'-';
  document.getElementById('d-crel').textContent=s.cRel||'-';
  const ph=document.getElementById('d-cphone');
  ph.innerHTML=`<i class="ti ti-phone"></i> ${s.cPhone||'-'}`;
  ph.href=s.cPhone?'tel:'+s.cPhone:'#';
  showDetailTab('info');
  document.getElementById('modal-detail').classList.add('open');
}

function deleteCurrentSenior(){
  if(!currentDetailId)return;
  if(!confirm('이 어르신 정보를 삭제하시겠습니까?'))return;
  saveSeniors(loadSeniors().filter(s=>s.id!==currentDetailId));
  closeModal('detail');currentDetailId=null;
  renderSeniors(loadSeniors());renderHome();
  toast('삭제되었습니다.');
}

function closeModal(type){document.getElementById('modal-'+type).classList.remove('open');}

function showDetailTab(t){
  document.querySelectorAll('.detail-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('dt-'+t).classList.add('active');
  const idx={info:0,health:1,contact:2};
  document.querySelectorAll('.tab')[idx[t]].classList.add('active');
}

renderHome();
</script>
</body>
</html>
